name: Build Windows Executable

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    name: PyInstaller – Windows portable build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies (no heavy ML libs)
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-docx pyinstaller

      - name: Build portable folder with PyInstaller
        run: pyinstaller build.spec

      - name: Verify executable exists
        run: |
          if (Test-Path "dist\MR_Letters_Generator\MR_Letters_Generator.exe") {
            Write-Host "Build succeeded: MR_Letters_Generator.exe found."
          } else {
            Write-Error "Build failed: executable not found."
            exit 1
          }

      - name: Zip the portable folder
        run: |
          Compress-Archive -Path "dist\MR_Letters_Generator\*" -DestinationPath "dist\MR_Letters_Generator.zip"

      - name: Upload portable build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MR_Letters_Generator-Windows
          path: dist/MR_Letters_Generator.zip
          retention-days: 30
